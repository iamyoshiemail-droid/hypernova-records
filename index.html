<!DOCTYPE html>
    <head>
        <title>HyperNova Records</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
            }

            video {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                z-index: -1;
            }

            .Click.button {
                position: relative;
                z-index: 1;
            }

            #unmuteBtn {
                position: fixed;
                top: 10px;
                right: 10px;
                z-index: 2;
                padding: 10px 20px;
                background-color: rgba(0, 0, 0, 0.7);
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 14px;
            }

            #unmuteBtn:hover {
                background-color: rgba(0, 0, 0, 0.9);
            }
        </style>
    </head>

    <body>
        
        <video id="bgVideo" autoplay muted loop>
            <source src="./media/videos/background/juicewrld-get-excited.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <button id="unmuteBtn">🔊 Unmute</button>

        <button class="Click button" onclick="window.location.href = './home.html';" >Click here</button>

        <script>
            const video = document.getElementById('bgVideo');
            const unmuteBtn = document.getElementById('unmuteBtn');

            unmuteBtn.addEventListener('click', function() {
                if (video.muted) {
                    video.muted = false;
                    unmuteBtn.textContent = '🔇 Mute';
                } else {
                    video.muted = true;
                    unmuteBtn.textContent = '🔊 Unmute';
                }
            });
        </script>

    </body>




























</html>
